services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: community_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      target: api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/community_db
      PORT: 4000
      JWT_SECRET: your-very-secret-key-change-me
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  pgdata:
